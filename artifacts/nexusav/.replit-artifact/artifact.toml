kind = "web"
previewPath = "/"
title = "NexusAV — Antivirus Scanner"
version = "1.0.0"
id = "artifacts/nexusav"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23976

[services.development]
run = "pnpm --filter @workspace/nexusav run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nexusav", "run", "build" ]
publicDir = "artifacts/nexusav/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23976"
BASE_PATH = "/"
